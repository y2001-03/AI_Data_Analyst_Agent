version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-data-analyst-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_data_analyst}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_data_analyst}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ai-data-analyst-backend
    environment:
      APP_NAME: AI Data Analyst Agent
      APP_ENV: development
      APP_DEBUG: "true"
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai_data_analyst
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v3}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
    container_name: ai-data-analyst-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-data-analyst-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:

